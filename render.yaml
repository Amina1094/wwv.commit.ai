services:
  - type: web
    name: workforce-pulse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: BRIGHTDATA_API_TOKEN
        sync: false
      - key: BRIGHTDATA_UNLOCKER_ZONE
        sync: false
      - key: BRIGHTDATA_SERP_ZONE
        sync: false
      - key: BRIGHTDATA_DC_HOST
        sync: false
      - key: BRIGHTDATA_DC_PORT
        sync: false
      - key: BRIGHTDATA_DC_USER
        sync: false
      - key: BRIGHTDATA_DC_PASS
        sync: false
